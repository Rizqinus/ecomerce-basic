<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-6">
  <form id="checkoutForm" class="bg-white p-8 rounded-lg shadow-md w-full max-w-md space-y-6">
    <h2 class="text-2xl font-semibold text-center">Checkout</h2>

    <div>
      <label for="fullName" class="block mb-1 font-medium">Full Name</label>
      <input type="text" id="fullName" name="fullName" placeholder="John Doe" required
        class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div>
      <label for="email" class="block mb-1 font-medium">Email</label>
      <input type="email" id="email" name="email" placeholder="john@example.com" required
        class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div>
      <label for="address" class="block mb-1 font-medium">Address</label>
      <textarea id="address" name="address" placeholder="123 Main St" required
        class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
    </div>

    <div class="flex gap-4">
      <div class="flex-1">
        <label for="city" class="block mb-1 font-medium">City</label>
        <input type="text" id="city" name="city" placeholder="Jakarta" required
          class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div class="flex-1">
        <label for="zip" class="block mb-1 font-medium">ZIP Code</label>
        <input type="text" id="zip" name="zip" placeholder="12345" required pattern="\d{5}"
          title="Please enter a valid 5-digit ZIP code"
          class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
    </div>

    <div>
      <label for="phone" class="block mb-1 font-medium">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="+62 812 3456 7890" required
        class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <div>
      <label for="paymentMethod" class="block mb-1 font-medium">Payment Method</label>
      <select id="paymentMethod" name="paymentMethod" required
        class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="" disabled selected>Select a method</option>
        <option value="bankTransfer">Bank Transfer</option>
        <option value="creditCard">Credit Card</option>
        <option value="cod">Cash on Delivery (COD)</option>
      </select>
    </div>

    <button type="submit" 
      class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-semibold">
      Place Order
    </button>
  </form>

  <script>
    document.getElementById('checkoutForm').addEventListener('submit', function(e) {
      e.preventDefault(); // prevent form default submit
      
      // Simple form validation check
      if(!this.checkValidity()) {
        alert('Please fill out all fields correctly.');
        return;
      }

      // Collect form data
      const data = {
        fullName: this.fullName.value.trim(),
        email: this.email.value.trim(),
        address: this.address.value.trim(),
        city: this.city.value.trim(),
        zip: this.zip.value.trim(),
        phone: this.phone.value.trim(),
        paymentMethod: this.paymentMethod.value,
      };

      // For now, just show data (replace with real submit e.g. fetch API)
      alert('Order placed!\n' + JSON.stringify(data, null, 2));

      // Optionally redirect to thank you page:
      // window.location.href = 'thankyou.html';
    });
  </script>
</body>
</html>
