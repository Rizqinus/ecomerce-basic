<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com\"></script>
  <title>Detail Produk</title>
</head>


  <header class="flex items-center justify-between px-6 py-4 shadow-md">
    <div class="flex items-center space-x-2">
      <a href="./apii.html">
      <div class="text-3xl font-extrabold">RNG STORE</div>
      </a>
    </div>
    <div class="flex-1 px-6">
      <div class="relative max-w-md mx-auto">
        <input type="text" placeholder="Search..." class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <span class="absolute right-3 top-2.5 text-gray-500">🔍</span>
      </div>
    </div>
    <div class="flex items-center space-x-4">
      <button class="px-4 py-2 bg-red-100 text-red-500 rounded-full">Wishlist</button>
      <a href="cart.html">
          <button class="px-4 py-2 bg-blue-100 text-blue-500 rounded-full">Your Cart</button>
        </a>
        <a href="profil.html">
  <img src="./image/6c11d28a-ec7f-44a1-aa68-a63252a9817f-removebg-preview.png" alt="Profile" class="w-10 h-10 rounded-full object-cover border border-gray-300" />
</a>
        </div>
    </div>
</header>
<body>
  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- Gambar Produk -->
      <div>
        <img
          id="product-image"
          src="https://via.placeholder.com/600x400"
          alt="Loading..."
          class="w-full rounded-lg shadow-lg object-cover"
        />
        <div class="flex space-x-3 mt-4 overflow-x-auto">
          <div class="w-16 h-16 bg-gray-200 rounded-md shadow shrink-0"></div>
          <div class="w-16 h-16 bg-gray-200 rounded-md shadow shrink-0"></div>
          <div class="w-16 h-16 bg-gray-200 rounded-md shadow shrink-0"></div>
          <div class="w-16 h-16 bg-gray-200 rounded-md shadow shrink-0"></div>
        </div>
      </div>

      <!-- Detail Produk -->
      <div>
        <h2 id="product-title" class="text-xl md:text-2xl font-bold mb-4">
          Loading...
        </h2>

        <!-- Pilihan Warna -->
        <div class="mb-4">
          <p class="text-sm font-medium text-gray-700 mb-2">Pilih Warna:</p>
          <div id="color-options" class="flex gap-2 flex-wrap">
            <button data-color="Hitam" class="color-btn border px-3 py-1 rounded text-sm hover:bg-gray-200">Hitam</button>
            <button data-color="Putih" class="color-btn border px-3 py-1 rounded text-sm hover:bg-gray-200">Putih</button>
            <button data-color="Abu" class="color-btn border px-3 py-1 rounded text-sm hover:bg-gray-200">Abu</button>
          </div>
        </div>

        <!-- Pilih Ukuran -->
        <div class="flex flex-wrap gap-2 mb-4">
          <button class="border px-4 py-2 rounded text-sm hover:bg-gray-100">
            Select Size
          </button>
          <button class="border px-4 py-2 rounded text-sm hover:bg-gray-100 flex items-center gap-1">
            Size Guide
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </button>
        </div>

        <!-- Pilihan Ukuran -->
        <div class="flex flex-wrap gap-2 mb-6">
          <button data-size="36" class="size-btn border rounded px-3 py-1 hover:bg-gray-200 text-sm">36</button>
          <button data-size="37" class="size-btn border rounded px-3 py-1 hover:bg-gray-200 text-sm">37</button>
          <button data-size="38" class="size-btn border rounded px-3 py-1 hover:bg-gray-200 text-sm">38</button>
          <button data-size="39" class="size-btn border rounded px-3 py-1 hover:bg-gray-200 text-sm">39</button>
          <button data-size="40" class="size-btn border rounded px-3 py-1 hover:bg-gray-200 text-sm">40</button>
          <button data-size="41" class="size-btn border rounded px-3 py-1 hover:bg-gray-200 text-sm">41</button>
          <button data-size="42" class="size-btn bg-cyan-500 text-white px-3 py-1 rounded text-sm">42</button>
          <button data-size="43" class="size-btn border rounded px-3 py-1 hover:bg-gray-200 text-sm">43</button>
        </div>

        <!-- Tombol & Harga -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4">
          <div class="flex items-center gap-2">
            <button id="qty-minus" class="px-3 py-1 border rounded text-xl" type="button">-</button>
            <input id="qty-input" type="number" value="1" min="1" class="w-12 text-center border rounded" />
            <button id="qty-plus" class="px-3 py-1 border rounded text-xl" type="button">+</button>
          </div>
          <span id="product-price" class="text-xl font-semibold text-gray-800">Rp. ...</span>
        </div>

        <p class="mb-4 text-sm text-gray-500">
          Jumlah barang: <span id="total-barang">1</span>
        </p>

        <button
          id="add-to-cart"
          class="bg-blue-600 hover:bg-blue-700 text-white w-full px-6 py-2 rounded shadow flex items-center justify-center gap-2"
          type="button"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-1.5 6H19M6 19a2 2 0 100 4 2 2 0 000-4zm12 0a2 2 0 100 4 2 2 0 000-4z" />
          </svg>
          Add to Cart
        </button>

        <!-- Tab Navigasi -->
        <div class="border-b flex overflow-x-auto gap-6 text-sm font-medium mt-8 mb-4">
          <button class="text-blue-500 border-b-2 border-blue-500 pb-2">Description</button>
          <button class="text-gray-600 hover:text-blue-500 pb-2">Size & Fit</button>
          <button class="text-gray-600 hover:text-blue-500 pb-2">Free Shipping & Returns</button>
          <button class="text-gray-600 hover:text-blue-500 pb-2">Reviews</button>
        </div>

        <!-- Deskripsi -->
        <div id="product-description" class="text-sm text-gray-700 leading-relaxed">
          <p>Loading deskripsi...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="detail.js"></script>
</body>
</html>
