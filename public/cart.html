<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
</head>
  <header class="flex items-center justify-between px-6 py-4 shadow-md">
    <div class="flex items-center space-x-2">
      <a href="./apii.html">
      <div class="text-3xl font-extrabold">RNG STORE</div>
      </a>
    </div>
    <div class="flex-1 px-6">
      <div class="relative max-w-md mx-auto">
        <input type="text" placeholder="Search..." class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <span class="absolute right-3 top-2.5 text-gray-500">🔍</span>
      </div>
    </div>
    <div class="flex items-center space-x-4">
      <button class="px-4 py-2 bg-red-100 text-red-500 rounded-full">Wishlist</button>
      <a href="cart.html">
          <button class="px-4 py-2 bg-blue-100 text-blue-500 rounded-full">Your Cart</button>
        </a>
        <a href="profil.html">
  <img src="./image/6c11d28a-ec7f-44a1-aa68-a63252a9817f-removebg-preview.png" alt="Profile" class="w-10 h-10 rounded-full object-cover border border-gray-300" />
</a>
        </div>
    </div>
</header>
<body>
     <div class="max-w-7xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-6 font-sans">
    <!-- Cart Section --> 
    <div class="lg:col-span-2 border rounded-lg p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-2xl font-semibold">Cart</h2>
        <button id="clear-all" class="text-red-500 hover:underline text-sm">Clear All</button>
      </div>
      <div id="data-product" class="space-y-6"></div>
      <div id="cart-items"></div>
      <div id="jumlah-dipilih" class="mb-2 text-sm text-gray-700"></div>
    </div>

    <!-- Delivery & Summary -->
    <div class="border rounded-lg p-6 space-y-6">
      <h2 class="text-xl font-semibold">Delivery</h2>
      <div class="flex gap-2">
        <button class="px-4 py-2 border rounded bg-gray-100">Free</button>
        <button class="px-4 py-2 border rounded">Express 10.000 RB</button>
      </div>
      <p class="text-sm text-gray-500">Delivery Date, 7 Mei 2025</p>
      <div class="flex gap-2">
        <input type="text" placeholder="Promo Code" class="flex-1 border rounded px-3 py-2 text-sm"/>
        <button class="bg-black text-white px-4 rounded text-sm">Apply</button>
      </div>
      <p class="text-xs text-gray-400">20% off Discount</p>
      <div class="text-sm border-t pt-4 space-y-2">
        <div class="flex justify-between">
          <span>Subtotal</span><span id="subtotal">Rp. 0</span>
        </div>
        <div class="flex justify-between">
          <span>Delivery</span><span>Rp. 0</span>
        </div>
        <div class="flex justify-between">
          <span>Tax</span><span>Rp. 0</span>
        </div>
        <div class="flex justify-between font-semibold pt-2 border-t">
          <span>Total</span><span id="total">Rp. 0</span>
        </div>
      </div>
      <button onclick="location.href='checkout.html'" id="checkout"  class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded text-sm">
        Proceed to checkout
      </button>
    </div>
  </div>
  <script src="cart.js"></script>
</body>
</html>
