<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Account Settings</title>
</head>
<body class="bg-white font-sans">

    <!-- Header -->
  <header class="flex items-center justify-between px-6 py-4 shadow-md">
    <div class="flex items-center space-x-2">
      <a href="./apii.html">
      <div class="text-3xl font-extrabold">RNG STORE</div>
      </a>
    <div class="flex-1 px-6">

        <input type="text" placeholder="Search..." class="w-full pl-4 pr-10 py-2 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-400" />
        <span class="absolute right-3 top-2.5 text-gray-500">🔍</span>
      </div>
    </div>
    <div class="flex items-center space-x-4">
      <button class="px-4 py-2 bg-red-100 text-red-500 rounded-full">Wishlist</button>
      <a href="cart.html">
          <button class="px-4 py-2 bg-blue-100 text-blue-500 rounded-full">Your Cart</button>
        </a>
        </div>
    </div>
</header>

  <!-- Main Content -->
  <main class="p-8">
    <h2 class="text-xl font-bold mb-6">Account Settiings</h2>
    <div class="flex rounded-xl overflow-hidden border shadow-sm">
      <!-- Sidebar -->
      <aside class="w-64 border-r p-6 bg-white">
        <nav class="flex flex-col space-y-4">
          <button class="text-left text-blue-500 font-semibold bg-blue-100 py-2 px-4 rounded">My Profile</button>
          <button class="text-left text-black hover:bg-gray-100 py-2 px-4 rounded">Security</button>
          <button class="text-left flex items-center gap-2 hover:bg-gray-100 py-2 px-4 rounded">
            <span class="text-lg">&#128100;</span> Contact
          </button>
          <button class="text-left flex items-center gap-2 hover:bg-gray-100 py-2 px-4 rounded">
            <span class="text-lg">&#9881;&#65039;</span> Settings
          </button>
        </nav>
        <button class="w-full mt-10 bg-red-100 text-red-500 py-2 rounded">Log Out</button>
      </aside>

      <!-- Profile Content -->
      <section class="flex-1 p-6">
        <h3 class="text-lg font-semibold mb-4">My Profile</h3>

        <!-- Top Profile Box -->
        <div class="border rounded-xl p-4 flex items-start justify-between mb-6">
          <div class="flex gap-4 items-center">
            <div class="w-20 h-20 rounded-full bg-gray-300"></div>
            <div>
              <p class="font-semibold">Bayu Nur Wahyuda</p>
              <p class="text-sm text-gray-600">Pelajar</p>
              <p class="text-sm text-gray-500">Jatijajar, Depok</p>
            </div>
          </div>
          <button class="border px-4 py-1 rounded text-sm">Edit</button>
        </div>

        <!-- Personal Info Box -->
        <div class="border rounded-xl p-4">
          <div class="flex justify-between items-center mb-4">
            <h4 class="font-semibold">Personal Information</h4>
            <button class="border px-4 py-1 rounded text-sm">Edit</button>
          </div>
          <div class="grid grid-cols-2 gap-4 text-sm">
            <div>
              <p class="text-gray-500">Frist Name</p>
              <p class="font-medium">Bayu</p>
            </div>
            <div>
              <p class="text-gray-500">Last Name</p>
              <p class="font-medium">Nur Wahyu</p>
            </div>
            <div>
              <p class="text-gray-500">Email</p>
              <p class="font-medium">bayugANTENG@gmail.com</p>
            </div>
            <div>
              <p class="text-gray-500">Phone</p>
              <p class="font-medium">083832832932</p>
            </div>
            <div>
              <p class="text-gray-500">Bio</p>
              <p class="font-medium">Pelajar</p>
            </div>
          </div>
        </div>

      </section>
    </div>

</html>
