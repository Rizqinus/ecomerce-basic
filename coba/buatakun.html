<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Ecommerch</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white rounded-xl shadow-lg overflow-hidden w-full max-w-5xl flex flex-col md:flex-row">

    <!-- Form Register -->
    <div class="w-full md:w-1/2 p-8">
      <h2 class="text-3xl font-bold text-indigo-600 text-center mb-6">Daftar Akun</h2>

      <form action="#" method="POST" class="space-y-5">

        <!-- Nama -->
        <div>
          <label for="nama" class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
          <input type="text" id="nama" name="nama" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input type="password" id="password" name="password" required
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" />
        </div>

        <!-- Tombol -->
        <div>
          <button type="submit"
            class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
            Daftar
          </button>
        </div>
      </form>

      <p class="text-center text-sm text-gray-600 mt-4">
        Sudah punya akun?
        <a href="login.html" class="text-indigo-600 hover:underline">Masuk di sini</a>
      </p>
    </div>

    <!-- Gambar Kanan -->
    <div class="w-full md:w-1/2 h-64 md:h-auto">
      <img src="https://source.unsplash.com/600x800/?shopping,fashion" alt="Register Image"
        class="w-full h-full object-cover" />
    </div>

  </div>

</body>
</html>
